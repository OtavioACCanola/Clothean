<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothean — Login</title>

  <!--SweetAlert-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.24/dist/sweetalert2.all.min.js"></script>

  <!--CSS -->
  <link rel="stylesheet" href="../CSS/loginAdmCSS.css">

  <!-- // Script -->

  <!--Model-->
  <script src="../JavaScript/FrontEnd/Model/validacoes.js"></script>

  <!--View-->
  <script src="../JavaScript/FrontEnd/View/mostrarMensagem.js"></script>
  <script src="../JavaScript/FrontEnd/View/funcoesSenha.js"></script>


  <!--Controller-->
  <script src="../JavaScript/FrontEnd/Controller/loginAdm.js"></script>
</head>

<body>
  <div class="card">
    <div class="logo">
      <span>Clothean</span>
      <p>Painel administrativo</p>
    </div>
    <form onsubmit="loginAdmin(event)">
      <div class="grupo">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="admin@clothean.com.br">
      </div>
      <div class="grupo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••">
      </div>
      <div class="row">
        <span></span>
        <a href="#">Esqueceu a senha?</a>
      </div>
      <button class="btn" type="submit" id="btnLogarAdm">Entrar</button>
    </form>
    <div class="rodape">Não tem acesso? <a href="./cadastro-admin.html">Solicitar conta</a></div>
  </div>
</body>

</html>
