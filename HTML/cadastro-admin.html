<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clothean — Cadastro de administrador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#f4f4f4;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:36px 40px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:24px}
.logo span{font-size:22px;font-weight:600;color:#2BA2DD}
.logo p{font-size:12px;color:#888;margin-top:2px}
label{display:block;font-size:13px;font-weight:500;color:#444;margin-bottom:6px}
input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:7px;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;appearance:none;background:#fff}
input:focus,select:focus{border-color:#7CBF5C}
.grupo{margin-bottom:14px}
.duplo{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{width:100%;padding:11px;background:#7CBF5C;color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{background:#6aaf4c}
.rodape{text-align:center;margin-top:14px;font-size:12px;color:#888}
.rodape a{color:#2BA2DD;text-decoration:none}
.erro{font-size:11px;color:#e24b4a;margin-top:4px;display:none}
.erro.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span>Clothean</span>
    <p>Cadastro de administrador</p>
  </div>
  <form onsubmit="enviar(event)">

    <div class="grupo">
      <label>Nome</label>
      <input type="text" id="nome" placeholder="Nome completo" required>
    </div>

    <div class="grupo">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="admin@clothean.com.br" required>
    </div>

    <div class="duplo">
      <div class="grupo">
        <label>CPF</label>
        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
      </div>
      <div class="grupo">
        <label>Telefone</label>
        <input type="tel" id="telefone" placeholder="(11) 99999-9999" maxlength="15" required>
      </div>
    </div>

    <div class="grupo">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="Mínimo 8 caracteres" required>
    </div>

    <div class="grupo">
      <label>Confirmar senha</label>
      <input type="password" id="confirmar" placeholder="Repita a senha" required>
      <p class="erro" id="err-senha">As senhas não coincidem.</p>
    </div>

    <div class="grupo">
      <label>Tipo</label>
      <select id="tipo">
        <option value="admin">Administrador</option>
      </select>
    </div>

    <button class="btn" type="submit">Cadastrar</button>
  </form>
  <div class="rodape">Já tem acesso? <a href="login.html">Fazer login</a></div>
</div>
<script src="/JavaScript/Controller/Front-End/cadastroAdm.js"></script>
</body>
</html>
